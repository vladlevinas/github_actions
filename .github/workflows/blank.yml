name: CI/CD Pipeline
run-name: Execute CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - src/**
      - .github/workflows/**
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - closed
    paths:
      - src/**
      - .github/workflows/**
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      version:
        description: "Version number to deploy"
        required: false
        type: string

env:
  GLOBAL_VAR: GlobalEnvironmentVariableValue

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    env:
      BUILD_ENV: BuildJobEnvironmentValue
    outputs:
      build-output: ${{ steps.save-build-output.outputs.build_status }}
    steps:
      - id: checkout-code
        name: Checkout Code
        uses: actions/checkout@v4

      - id: inspect-repo
        name: Inspect Repository
        run: |
          echo "Inspecting repository..."
          echo "GLOBAL_VAR=$GLOBAL_VAR"
          echo "BUILD_ENV=$BUILD_ENV"
          pwd
          ls -la
          if [ -d "src" ]; then
            echo "src directory found"
          else
            echo "src directory not found"
          fi

      - id: build-project
        name: Build Project
        run: |
          echo "Running non-Node build placeholder..."
          mkdir -p build-output
          echo "Build completed at $(date -u +"%Y-%m-%dT%H:%M:%SZ")" > build-output/BUILD_INFO.txt
          echo "Repository: $GITHUB_REPOSITORY" >> build-output/BUILD_INFO.txt
          echo "Commit SHA: $GITHUB_SHA" >> build-output/BUILD_INFO.txt
          echo "Ref: $GITHUB_REF" >> build-output/BUILD_INFO.txt

      - id: save-build-output
        name: Save Build Output
        run: |
          echo "build_status=success" >> "$GITHUB_OUTPUT"
          echo "Custom Input Provided: $CUSTOM_ENV"
        env:
          CUSTOM_ENV: custom-build-value

      - id: upload-artifacts
        name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ./build-output

  test:
    name: Run Tests
    needs: build
    runs-on: ubuntu-latest
    env:
      TEST_ENV: TestJobEnvironmentValue
    outputs:
      test-output: ${{ steps.save-test-output.outputs.test_status }}
    steps:
      - id: checkout-code
        name: Checkout Code
        uses: actions/checkout@v4

      - id: run-tests
        name: Run Tests
        run: |
          echo "Running non-Node test placeholder..."
          echo "TEST_ENV=$TEST_ENV"
          echo "GLOBAL_VAR=$GLOBAL_VAR"
          echo "Build Output: ${{ needs.build.outputs.build-output }}"
          echo "Test Param Provided: $CUSTOM_PARAM"

          # Example placeholder assertions:
          test -d src && echo "src exists" || echo "src does not exist"
        env:
          CUSTOM_PARAM: test-param-value

      - id: save-test-output
        name: Save Test Output
        run: echo "test_status=passed" >> "$GITHUB_OUTPUT"

      - id: download-artifacts
        name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./downloaded-artifacts

      - id: output-artifacts-content
        name: Output Artifacts Content
        run: |
          echo "Downloaded artifacts:"
          ls -la ./downloaded-artifacts
          echo "Build info file content:"
          cat ./downloaded-artifacts/BUILD_INFO.txt

  deploy:
    name: Deploy Application
    needs: [build, test]
    runs-on: ubuntu-latest
    outputs:
      deployment-status: ${{ steps.save-deployment-output.outputs.deployment_status }}
    steps:
      - id: deploy-to-env
        name: Deploy to Environment
        run: |
          echo "Deploying non-Node application placeholder..."
          echo "DEPLOY_ENV=$DEPLOY_ENV"
          echo "GLOBAL_VAR=$GLOBAL_VAR"
          echo "Test Output: ${{ needs.test.outputs.test-output }}"
        env:
          DEPLOY_ENV: DeploymentJobEnvironmentValue

      - id: download-artifacts
        name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./deploy-artifacts

      - id: output-artifacts-content
        name: Output Artifacts Content
        run: |
          echo "Artifacts available for deployment:"
          ls -la ./deploy-artifacts
          cat ./deploy-artifacts/BUILD_INFO.txt

      - id: save-deployment-output
        name: Save Deployment Output
        run: echo "deployment_status=success" >> "$GITHUB_OUTPUT"
